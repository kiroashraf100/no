<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unfortunately I still love u</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
            position: relative;
        }

        .hearts-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            animation: float 6s ease-in-out infinite;
            font-size: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .main-text {
            font-size: 4rem;
            color: #e74c3c;
            text-align: center;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: pulse 2s ease-in-out infinite;
            padding: 20px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ===== ADMIN PANEL ===== */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 9999;
            overflow-y: auto;
            padding: 20px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .admin-panel.active { display: block; }

        .login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: #16213e;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #0f3460;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        .login-box h2 { color: #e94560; margin-bottom: 10px; font-size: 1.8rem; }
        .login-box p { color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }

        .login-box input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #0f3460;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-box input:focus { border-color: #e94560; }

        .login-box button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: #e94560;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover { background: #ff6b81; transform: translateY(-2px); }

        .login-error { color: #e74c3c; margin-top: 15px; font-size: 0.9rem; display: none; }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e74c3c;
        }

        .admin-header h2 { color: #e74c3c; font-size: 1.8rem; }

        .admin-close {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #0f3460;
        }

        .stat-card h3 { color: #e94560; font-size: 2rem; margin-bottom: 5px; }
        .stat-card p { color: #aaa; font-size: 0.9rem; }

        .visits-table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 15px;
            overflow: hidden;
        }

        .visits-table th, .visits-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }

        .visits-table th {
            background: #0f3460;
            color: #e94560;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .visits-table tr:hover { background: #1a1a3e; }
        .visits-table td { font-size: 0.9rem; color: #ddd; }

        .ip-badge {
            background: #e94560;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .location-badge {
            background: #0f3460;
            color: #4cc9f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .time-badge { color: #aaa; font-size: 0.8rem; }

        .clear-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .clear-btn:hover { background: #e74c3c; }

        .export-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
            margin-left: 10px;
        }

        .loading { color: #e94560; text-align: center; padding: 20px; }
        .error-msg { color: #e74c3c; text-align: center; padding: 20px; }

        @media (max-width: 768px) {
            .main-text { font-size: 2.5rem; }
            .visits-table { font-size: 0.75rem; }
            .visits-table th, .visits-table td { padding: 8px; }
            .admin-header h2 { font-size: 1.3rem; }
            .login-box { padding: 30px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="hearts-bg" id="heartsBg"></div>

    <div class="main-text" id="mainText">
        unfortunately I still love u
    </div>

    <!-- ===== ADMIN PANEL ===== -->
    <div class="admin-panel" id="adminPanel">

        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <h2>🔒 Admin Access</h2>
                <p>Enter password to view visitor logs</p>
                <input type="password" id="adminPassword" placeholder="Enter password..." autocomplete="off">
                <button onclick="checkPassword()">Login</button>
                <div class="login-error" id="loginError">Wrong password!</div>
            </div>
        </div>

        <div id="dashboardContent" style="display:none;">
            <div class="admin-header">
                <h2>🔒 Visitor Logs Dashboard</h2>
                <button class="admin-close" onclick="closeAdmin()">Close</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="totalVisits">0</h3>
                    <p>Total Visits</p>
                </div>
                <div class="stat-card">
                    <h3 id="uniqueIPs">0</h3>
                    <p>Unique IPs</p>
                </div>
                <div class="stat-card">
                    <h3 id="todayVisits">0</h3>
                    <p>Today\'s Visits</p>
                </div>
                <div class="stat-card">
                    <h3 id="egyptVisits">0</h3>
                    <p>From Egypt</p>
                </div>
            </div>

            <div style="margin-bottom: 15px;">
                <button class="clear-btn" onclick="clearLogs()">🗑️ Clear All Logs</button>
                <button class="export-btn" onclick="exportLogs()">📥 Export CSV</button>
            </div>

            <div id="tableContainer">
                <div class="loading">Loading visitor data...</div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIG - EDIT THESE =====
        // 1. Go to https://jsonbin.io
        // 2. Sign up (Google/GitHub - 30 seconds)
        // 3. Create a bin with: {"visits": []}
        // 4. Paste your Bin ID and API Key below
        const JSONBIN_BIN_ID = '6a399622da38895dfeedb315';        // <-- PASTE BIN ID
        const JSONBIN_API_KEY = '$2a$10$KhuwK71ieev.1YAgSK3/ae2BkMh3ksFYfXNHRdm9Aa9YOpZnP4G7W';      // <-- PASTE API KEY

        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
        const ADMIN_PASSWORD = 'nona2025';

        // ===== BACKGROUND HEARTS =====
        function createBackgroundHearts() {
            const container = document.getElementById('heartsBg');
            const hearts = ['💕', '💖', '💗', '💓', '💝', '🌹', '✨', '🦋'];

            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 300);
        }
        createBackgroundHearts();

        // ===== GET VISITOR DATA =====
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return 'Unknown'; }
        }

        async function getLocation(ip) {
            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await res.json();
                return {
                    country: data.country_name || 'Unknown',
                    region: data.region || 'Unknown',
                    city: data.city || 'Unknown',
                    isp: data.org || data.asn || 'Unknown'
                };
            } catch {
                return { country: 'Unknown', region: 'Unknown', city: 'Unknown', isp: 'Unknown' };
            }
        }

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Desktop';
            if (/Mobile|Android|iPhone|iPod/.test(ua)) device = 'Mobile';
            if (/Tablet|iPad/.test(ua)) device = 'Tablet';

            let browser = 'Unknown';
            if (/Chrome/.test(ua)) browser = 'Chrome';
            else if (/Firefox/.test(ua)) browser = 'Firefox';
            else if (/Safari/.test(ua)) browser = 'Safari';
            else if (/Edge/.test(ua)) browser = 'Edge';
            else if (/Opera/.test(ua)) browser = 'Opera';

            return { device, browser };
        }

        // ===== SAVE VISIT TO JSONBIN =====
        async function logVisitor() {
            // Skip if config not set
            if (JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE' || JSONBIN_API_KEY === 'YOUR_API_KEY_HERE') {
                console.log('JSONBin not configured - visit not logged to cloud');
                return;
            }

            try {
                const ip = await getIP();
                const location = await getLocation(ip);
                const deviceInfo = getDeviceInfo();

                const visit = {
                    id: Date.now(),
                    ip: ip,
                    country: location.country,
                    region: location.region,
                    city: location.city,
                    isp: location.isp,
                    device: deviceInfo.device,
                    browser: deviceInfo.browser,
                    timestamp: new Date().toISOString(),
                    timeFormatted: new Date().toLocaleString('en-GB', { 
                        timeZone: 'Africa/Cairo',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    })
                };

                // Get current data
                const getRes = await fetch(JSONBIN_URL + '/latest', {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const getData = await getRes.json();
                const visits = getData.record.visits || [];

                // Add new visit
                visits.unshift(visit);

                // Save back
                await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ visits: visits })
                });

                console.log('Visit logged:', visit);
            } catch (err) {
                console.error('Failed to log visit:', err);
            }
        }

        logVisitor();

        // ===== URL ROUTING =====
        function handleRoute() {
            const hash = window.location.hash;
            if (hash === '#/admin') {
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('mainText').style.display = 'none';
            } else {
                document.getElementById('adminPanel').classList.remove('active');
                document.getElementById('mainText').style.display = 'block';
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboardContent').style.display = 'none';
                document.getElementById('adminPassword').value = '';
                document.getElementById('loginError').style.display = 'none';
            }
        }

        window.addEventListener('hashchange', handleRoute);
        handleRoute();

        // ===== LOGIN =====
        function checkPassword() {
            const input = document.getElementById('adminPassword').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';
                loadAndRenderLogs();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('adminPassword').value = '';
            }
        }

        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // ===== LOAD & RENDER LOGS =====
        async function loadAndRenderLogs() {
            const container = document.getElementById('tableContainer');

            if (JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE') {
                container.innerHTML = '<div class="error-msg">⚠️ Please configure JSONBin in the code first!<br><br>1. Go to jsonbin.io<br>2. Create a bin with: {\"visits\": []}<br>3. Paste Bin ID & API Key in the code</div>';
                return;
            }

            try {
                container.innerHTML = '<div class="loading">Loading visitor data...</div>';

                const res = await fetch(JSONBIN_URL + '/latest', {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });

                if (!res.ok) throw new Error('Failed to fetch');

                const data = await res.json();
                const logs = data.record.visits || [];

                renderLogs(logs);
            } catch (err) {
                container.innerHTML = `<div class="error-msg">Error loading data: ${err.message}<br><br>Make sure your Bin ID and API Key are correct.</div>`;
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('tableContainer');

            document.getElementById('totalVisits').textContent = logs.length;
            document.getElementById('uniqueIPs').textContent = new Set(logs.map(l => l.ip)).size;

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('todayVisits').textContent = logs.filter(l => l.timestamp && l.timestamp.startsWith(today)).length;
            document.getElementById('egyptVisits').textContent = logs.filter(l => l.country === 'Egypt').length;

            if (logs.length === 0) {
                container.innerHTML = '<div class="loading">No visits yet.</div>';
                return;
            }

            container.innerHTML = `
                <table class="visits-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>IP Address</th>
                            <th>Location</th>
                            <th>City</th>
                            <th>ISP</th>
                            <th>Device</th>
                            <th>Browser</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${logs.map((log, i) => `
                            <tr>
                                <td>${i + 1}</td>
                                <td><span class="ip-badge">${log.ip}</span></td>
                                <td><span class="location-badge">${log.country} - ${log.region}</span></td>
                                <td>${log.city}</td>
                                <td>${log.isp}</td>
                                <td>${log.device}</td>
                                <td>${log.browser}</td>
                                <td class="time-badge">${log.timeFormatted}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function closeAdmin() {
            window.location.hash = '';
        }

        // ===== CLEAR LOGS =====
        async function clearLogs() {
            if (!confirm('Are you sure you want to delete all logs?')) return;

            if (JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE') {
                alert('JSONBin not configured!');
                return;
            }

            try {
                await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ visits: [] })
                });

                loadAndRenderLogs();
            } catch (err) {
                alert('Error clearing logs: ' + err.message);
            }
        }

        // ===== EXPORT =====
        async function exportLogs() {
            if (JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE') {
                alert('JSONBin not configured!');
                return;
            }

            try {
                const res = await fetch(JSONBIN_URL + '/latest', {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await res.json();
                const logs = data.record.visits || [];

                if (logs.length === 0) {
                    alert('No logs to export!');
                    return;
                }

                const csv = [
                    ['#', 'IP', 'Country', 'Region', 'City', 'ISP', 'Device', 'Browser', 'Time'].join(','),
                    ...logs.map((log, i) => [
                        i + 1,
                        log.ip,
                        log.country,
                        log.region,
                        log.city,
                        log.isp,
                        log.device,
                        log.browser,
                        log.timeFormatted
                    ].join(','))
                ].join('\n');

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `visitor_logs_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                alert('Error exporting: ' + err.message);
            }
        }
    </script>
</body>
</html>
