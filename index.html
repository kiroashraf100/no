<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unfortunately I still love u</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
            position: relative;
        }

        .hearts-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            animation: float 6s ease-in-out infinite;
            font-size: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .main-text {
            font-size: 4rem;
            color: #e74c3c;
            text-align: center;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: pulse 2s ease-in-out infinite;
            padding: 20px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ===== HIDDEN ADMIN PANEL ===== */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 9999;
            overflow-y: auto;
            padding: 20px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e74c3c;
        }

        .admin-header h2 {
            color: #e74c3c;
            font-size: 1.8rem;
        }

        .admin-close {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #0f3460;
        }

        .stat-card h3 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #aaa;
            font-size: 0.9rem;
        }

        .visits-table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 15px;
            overflow: hidden;
        }

        .visits-table th,
        .visits-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }

        .visits-table th {
            background: #0f3460;
            color: #e94560;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .visits-table tr:hover {
            background: #1a1a3e;
        }

        .visits-table td {
            font-size: 0.9rem;
            color: #ddd;
        }

        .ip-badge {
            background: #e94560;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .location-badge {
            background: #0f3460;
            color: #4cc9f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .time-badge {
            color: #aaa;
            font-size: 0.8rem;
        }

        .clear-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .clear-btn:hover {
            background: #e74c3c;
        }

        .export-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .main-text { font-size: 2.5rem; }
            .visits-table { font-size: 0.75rem; }
            .visits-table th, .visits-table td { padding: 8px; }
            .admin-header h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <!-- Background Hearts -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- Main Text -->
    <div class="main-text" id="mainText">
        unfortunately I still love u
    </div>

    <!-- ===== HIDDEN ADMIN PANEL ===== -->
    <!-- Secret access: triple-click anywhere on the page, then type "nona2025" -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h2>🔒 Visitor Logs Dashboard</h2>
            <button class="admin-close" onclick="closeAdmin()">Close</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalVisits">0</h3>
                <p>Total Visits</p>
            </div>
            <div class="stat-card">
                <h3 id="uniqueIPs">0</h3>
                <p>Unique IPs</p>
            </div>
            <div class="stat-card">
                <h3 id="todayVisits">0</h3>
                <p>Today's Visits</p>
            </div>
            <div class="stat-card">
                <h3 id="egyptVisits">0</h3>
                <p>From Egypt</p>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <button class="clear-btn" onclick="clearLogs()">🗑️ Clear All Logs</button>
            <button class="export-btn" onclick="exportLogs()">📥 Export CSV</button>
        </div>

        <table class="visits-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>IP Address</th>
                    <th>Location</th>
                    <th>City</th>
                    <th>ISP</th>
                    <th>Device</th>
                    <th>Browser</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="visitsTableBody">
            </tbody>
        </table>
    </div>

    <script>
        // ===== BACKGROUND HEARTS =====
        function createBackgroundHearts() {
            const container = document.getElementById('heartsBg');
            const hearts = ['💕', '💖', '💗', '💓', '💝', '🌹', '✨', '🦋'];

            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 300);
        }
        createBackgroundHearts();

        // ===== VISITOR TRACKING SYSTEM =====
        const STORAGE_KEY = 'visitor_logs_nona';

        // Get IP address
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return 'Unknown';
            }
        }

        // Get location from IP
        async function getLocation(ip) {
            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await res.json();
                return {
                    country: data.country_name || 'Unknown',
                    region: data.region || 'Unknown',
                    city: data.city || 'Unknown',
                    isp: data.org || data.asn || 'Unknown',
                    lat: data.latitude,
                    lon: data.longitude
                };
            } catch {
                return { country: 'Unknown', region: 'Unknown', city: 'Unknown', isp: 'Unknown' };
            }
        }

        // Get device info
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Desktop';
            if (/Mobile|Android|iPhone|iPad|iPod/.test(ua)) device = 'Mobile';
            if (/Tablet|iPad/.test(ua)) device = 'Tablet';

            let browser = 'Unknown';
            if (/Chrome/.test(ua)) browser = 'Chrome';
            else if (/Firefox/.test(ua)) browser = 'Firefox';
            else if (/Safari/.test(ua)) browser = 'Safari';
            else if (/Edge/.test(ua)) browser = 'Edge';
            else if (/Opera/.test(ua)) browser = 'Opera';

            return { device, browser };
        }

        // Log visitor
        async function logVisitor() {
            const ip = await getIP();
            const location = await getLocation(ip);
            const deviceInfo = getDeviceInfo();

            const visit = {
                id: Date.now(),
                ip: ip,
                country: location.country,
                region: location.region,
                city: location.city,
                isp: location.isp,
                device: deviceInfo.device,
                browser: deviceInfo.browser,
                timestamp: new Date().toISOString(),
                timeFormatted: new Date().toLocaleString('en-GB', { 
                    timeZone: 'Africa/Cairo',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                })
            };

            // Save to localStorage
            const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            logs.unshift(visit);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));

            console.log('Visitor logged:', visit);
        }

        // Run on page load
        logVisitor();

        // ===== ADMIN PANEL =====
        let clickCount = 0;
        let clickTimer = null;
        let secretInput = '';

        // Triple-click detection
        document.body.addEventListener('click', () => {
            clickCount++;
            if (clickCount === 3) {
                document.addEventListener('keydown', secretKeyHandler);
                clickCount = 0;
            }
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        });

        function secretKeyHandler(e) {
            secretInput += e.key.toLowerCase();
            if (secretInput.length > 9) secretInput = secretInput.slice(-9);

            if (secretInput.includes('nona2025')) {
                document.removeEventListener('keydown', secretKeyHandler);
                secretInput = '';
                openAdmin();
            }
        }

        function openAdmin() {
            document.getElementById('adminPanel').classList.add('active');
            renderLogs();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const tbody = document.getElementById('visitsTableBody');

            // Update stats
            document.getElementById('totalVisits').textContent = logs.length;
            document.getElementById('uniqueIPs').textContent = new Set(logs.map(l => l.ip)).size;

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('todayVisits').textContent = logs.filter(l => l.timestamp.startsWith(today)).length;
            document.getElementById('egyptVisits').textContent = logs.filter(l => l.country === 'Egypt').length;

            // Render table
            tbody.innerHTML = logs.map((log, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><span class="ip-badge">${log.ip}</span></td>
                    <td><span class="location-badge">${log.country} - ${log.region}</span></td>
                    <td>${log.city}</td>
                    <td>${log.isp}</td>
                    <td>${log.device}</td>
                    <td>${log.browser}</td>
                    <td class="time-badge">${log.timeFormatted}</td>
                </tr>
            `).join('');
        }

        function clearLogs() {
            if (confirm('Are you sure you want to delete all logs?')) {
                localStorage.removeItem(STORAGE_KEY);
                renderLogs();
            }
        }

        function exportLogs() {
            const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if (logs.length === 0) {
                alert('No logs to export!');
                return;
            }

            const csv = [
                ['#', 'IP', 'Country', 'Region', 'City', 'ISP', 'Device', 'Browser', 'Time'].join(','),
                ...logs.map((log, i) => [
                    i + 1,
                    log.ip,
                    log.country,
                    log.region,
                    log.city,
                    log.isp,
                    log.device,
                    log.browser,
                    log.timeFormatted
                ].join(','))
            ].join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `visitor_logs_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
